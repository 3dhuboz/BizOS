
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

    <!-- Primary Meta Tags -->
    <title>BizOS | Universal Small Business Platform</title>
    <meta name="title" content="BizOS | Universal Small Business Platform">
    <meta name="description" content="The all-in-one AI-powered platform for small businesses. Booking, ordering, CRM, social media, payments, and more — configured for any business type.">
    <meta name="keywords" content="small business platform, business OS, booking system, CRM, AI assistant, social media management, online ordering, business management">
    <meta name="author" content="BizOS">
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="BizOS">
    <meta property="og:title" content="BizOS | Universal Small Business Platform">
    <meta property="og:description" content="The all-in-one AI-powered platform for small businesses. Booking, ordering, CRM, social media, payments, and more.">
    <meta property="og:locale" content="en_AU">

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="BizOS | Universal Small Business Platform">
    <meta name="twitter:description" content="The all-in-one AI-powered platform for small businesses.">

    <!-- Favicon — SVG (modern browsers), PNG fallback, Apple touch icon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" href="/logo.png" sizes="any" />
    <link rel="shortcut icon" href="/favicon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/logo.png" />

    <!-- PWA / Web App -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#d9381e" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="BizOS" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="msapplication-TileColor" content="#d9381e" />
    <meta name="msapplication-TileImage" content="/logo.png" />
    <meta name="msapplication-config" content="none" />

    <!-- Performance: preconnect for third-party origins -->
    <link rel="preconnect" href="https://connect.facebook.net" />
    <link rel="preconnect" href="https://graph.facebook.com" />

    <!-- JSON-LD: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "BizOS",
      "description": "Universal AI-powered small business platform"
    }
    </script>

    <script>
      window.fbAsyncInit = function() {
        console.log('Facebook SDK loaded and ready.');
      };
    </script>
    <script async defer crossorigin="anonymous" src="https://connect.facebook.net/en_US/sdk.js"></script>

  </head>

    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
